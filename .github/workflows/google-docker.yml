name: Publish Docker image to google registry

on:
  workflow_dispatch:

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      -
        name: Check out the repo
        uses: actions/checkout@v3


      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

      # This example uses the docker login action
      - uses: 'docker/login-action@v1'
        with:
          registry: 'us-east1-docker.pkg.dev' # or REGION-docker.pkg.dev
          username: 'docker-registry@chooeki-210509.iam.gserviceaccount.com'
          password: '${{ steps.auth.outputs.access_token }}'

      # This example runs "docker login" directly to Artifact Registry.
      - run: |-
          echo '${{ steps.auth.outputs.access_token }}' | docker login -u oauth2accesstoken --password-stdin https://us-east1-docker.pkg.dev


        